name: Daily FMCSA Active Leads

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = 6AM CST
  workflow_dispatch:  # run manually anytime

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run scraper
        run: python scraper.py
      
      - name: Commit new leads if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add active_leads.csv
          git diff --staged --quiet || git commit -m "Daily active MC leads update $(date +%Y-%m-%d)"
          git push
