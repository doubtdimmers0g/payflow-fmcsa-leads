name: Daily FMCSA Dismissal Scraper

on:
  schedule:
    - cron: '0 15 * * 1-5'  # 10:00 AM Central (15:00 UTC) – slightly after main run
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium
      
      - name: Run dismissal scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python dismissal_scraper.py
      
      - name: Clean up
        run: rm -f creds.json