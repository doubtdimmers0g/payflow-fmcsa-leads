name: Cumulative Daily Report

on:
  schedule:
    - cron: '0 19 * * 1-5'     # 2:00 PM Central
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # ← This fixes the error you got

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install deps
        run: pip install gspread google-auth requests

      - name: Send cumulative report
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TELEGRAM_TOKEN: 8733411381:AAHK0TqW0SE6yRu3VwHpuUZcTeB9dsEejH0
          CHAT_ID: 7691951053
        run: python .github/scripts/cumulative_report.py